services:
  # docker compose up --build
  # Builds the app (installs deps, runs tests + `next build`) and serves
  # the production build.
  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  # docker compose --profile dev up dev --build
  # Runs `next dev`; the bind mount reflects source edits into the
  # container immediately for hot reload. node_modules and .next are kept
  # in anonymous volumes so the container's own (linux) install isn't
  # clobbered by the host's.
  dev:
    profiles:
      - dev
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  # docker compose --profile playwright up iphone --build
  # Opens a headed WebKit window emulating an iPhone 15 Pro, pointed at the
  # `app` (production) service. Runs with no timeout — stays open until you
  # close the window. Authenticates to your host's X server using your own
  # Xauthority cookie (no `xhost` grant needed).
  iphone:
    profiles:
      - playwright
    build:
      context: .
      target: playwright
    command: ["node", "open-iphone.mjs"]
    environment:
      APP_URL: http://app:3000
      DISPLAY: ${DISPLAY}
      XAUTHORITY: /tmp/.docker.xauth
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/tmp/.docker.xauth:ro
    depends_on:
      - app

  # docker compose --profile playwright up mac --build
  # Same as `iphone`, but opens Desktop Safari (Playwright's only Mac/Safari
  # preset — there's no per-model Mac descriptor).
  mac:
    profiles:
      - playwright
    build:
      context: .
      target: playwright
    command: ["node", "open-mac.mjs"]
    environment:
      APP_URL: http://app:3000
      DISPLAY: ${DISPLAY}
      XAUTHORITY: /tmp/.docker.xauth
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/tmp/.docker.xauth:ro
    depends_on:
      - app
