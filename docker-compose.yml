services:
  # docker compose up --build
  # Builds the app (installs deps, runs tests + `next build`) and serves
  # the production build.
  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  # docker compose --profile dev up dev --build
  # Runs `next dev`; the bind mount reflects source edits into the
  # container immediately for hot reload. node_modules and .next are kept
  # in anonymous volumes so the container's own (linux) install isn't
  # clobbered by the host's.
  dev:
    profiles:
      - dev
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  # docker compose --profile playwright up tls-proxy --build
  # Terminates HTTPS (self-signed, via Caddy's `tls internal`) in front of
  # `app`. The site's CSP sends `upgrade-insecure-requests`, which makes
  # browsers silently rewrite every asset request from http to https — over
  # plain http:3000 those upgraded requests have nothing to TLS-handshake
  # with and fail, breaking CSS/JS/fonts. This proxy exists purely so the
  # iphone/mac preview windows have a real https endpoint to hit, without
  # touching the app's production CSP.
  tls-proxy:
    profiles:
      - playwright
    image: caddy:2-alpine
    volumes:
      - ./playwright/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - app

  # docker compose --profile playwright up iphone --build
  # Opens a headed WebKit window emulating an iPhone 15 Pro, pointed at
  # tls-proxy (which fronts the `app` production service over https). Runs
  # with no timeout — stays open until you close the window. Authenticates
  # to your host's X server using your own Xauthority cookie (no `xhost`
  # grant needed).
  iphone:
    profiles:
      - playwright
    build:
      context: .
      target: playwright
    command: ["node", "open-iphone.mjs"]
    environment:
      APP_URL: https://tls-proxy
      DISPLAY: ${DISPLAY}
      XAUTHORITY: /tmp/.docker.xauth
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/tmp/.docker.xauth:ro
    depends_on:
      - tls-proxy

  # docker compose --profile playwright up mac --build
  # Same as `iphone`, but opens Desktop Safari (Playwright's only Mac/Safari
  # preset — there's no per-model Mac descriptor).
  mac:
    profiles:
      - playwright
    build:
      context: .
      target: playwright
    command: ["node", "open-mac.mjs"]
    environment:
      APP_URL: https://tls-proxy
      DISPLAY: ${DISPLAY}
      XAUTHORITY: /tmp/.docker.xauth
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/tmp/.docker.xauth:ro
    depends_on:
      - tls-proxy
